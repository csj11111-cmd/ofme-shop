<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUSE — 패션 셀렉트샵</title>
<style>
  :root{
    --bg:#ffffff;
    --ink:#1a1a1a;
    --muted:#8a8a8a;
    --line:#ececec;
    --soft:#f6f6f4;
    --accent:#1a1a1a;
    --radius:14px;
    --max:1180px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Helvetica Neue','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    color:var(--ink);background:var(--bg);line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none}
  img{display:block;width:100%}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  .wrap{max-width:var(--max);margin:0 auto;padding:0 24px}

  /* Header */
  header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .nav{display:flex;align-items:center;justify-content:space-between;height:66px}
  .logo{font-size:24px;font-weight:800;letter-spacing:3px}
  .menu{display:flex;gap:28px;font-size:14px;font-weight:500}
  .menu a{padding:4px 0;border-bottom:2px solid transparent;transition:.2s}
  .menu a:hover,.menu a.on{border-color:var(--ink)}
  .icons{display:flex;gap:18px;align-items:center;font-size:14px}
  .cart-btn{position:relative;font-weight:600}
  .cart-count{position:absolute;top:-9px;right:-12px;background:var(--ink);color:#fff;font-size:10px;
    min-width:17px;height:17px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}

  /* Hero */
  .hero{background:var(--soft);padding:70px 0;text-align:center}
  .hero h1{font-size:46px;font-weight:800;letter-spacing:-1px;line-height:1.15}
  .hero p{color:var(--muted);margin-top:14px;font-size:16px}
  .hero .btn{margin-top:26px}
  .btn{display:inline-block;background:var(--ink);color:#fff;padding:13px 30px;border-radius:30px;font-size:14px;font-weight:600;transition:.2s}
  .btn:hover{opacity:.85}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--ink)}

  /* Section */
  section{padding:54px 0}
  .sec-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:26px}
  .sec-head h2{font-size:24px;font-weight:800;letter-spacing:-.5px}
  .sec-head span{color:var(--muted);font-size:13px}

  /* Category pills */
  .cats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px}
  .cats button{padding:9px 18px;border:1px solid var(--line);border-radius:30px;font-size:13px;font-weight:500;transition:.2s;color:var(--muted)}
  .cats button.on{background:var(--ink);color:#fff;border-color:var(--ink)}

  /* Grid */
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:26px 22px}
  .card{cursor:pointer}
  .card .thumb{aspect-ratio:3/4;border-radius:var(--radius);overflow:hidden;position:relative;background:var(--soft)}
  .card .thumb svg{width:100%;height:100%}
  .card:hover .thumb img,.card:hover .thumb svg{transform:scale(1.04)}
  .card .thumb img,.card .thumb svg{transition:transform .4s ease}
  .tag{position:absolute;top:10px;left:10px;background:#fff;color:var(--ink);font-size:11px;font-weight:700;padding:4px 9px;border-radius:6px}
  .card .brand{margin-top:12px;font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.5px}
  .card .name{font-size:14px;margin-top:3px}
  .card .price{font-size:15px;font-weight:700;margin-top:6px}
  .card .price .was{color:var(--muted);font-weight:400;text-decoration:line-through;font-size:13px;margin-right:6px}
  .card .price .off{color:#e0492f;margin-right:6px}

  /* Detail */
  .detail{display:grid;grid-template-columns:1fr 1fr;gap:50px;padding-top:34px}
  .detail .img{border-radius:var(--radius);overflow:hidden;background:var(--soft);aspect-ratio:3/4}
  .detail .brand{font-size:13px;color:var(--muted);font-weight:700;letter-spacing:1px}
  .detail h1{font-size:28px;font-weight:800;margin-top:8px;letter-spacing:-.5px}
  .detail .dprice{font-size:24px;font-weight:800;margin:18px 0}
  .detail .dprice .was{color:var(--muted);font-weight:400;text-decoration:line-through;font-size:17px;margin-right:9px}
  .detail .desc{color:#555;font-size:14px;line-height:1.8;border-top:1px solid var(--line);padding-top:20px;margin-top:6px}
  .opt-label{font-size:13px;font-weight:700;margin:22px 0 10px}
  .sizes{display:flex;gap:8px}
  .sizes button{width:46px;height:42px;border:1px solid var(--line);border-radius:9px;font-size:13px;font-weight:600;transition:.15s}
  .sizes button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .detail-actions{display:flex;gap:10px;margin-top:30px}
  .detail-actions .btn{flex:1;text-align:center}
  .back{font-size:13px;color:var(--muted);margin-bottom:8px;display:inline-flex;gap:5px;align-items:center}
  .back:hover{color:var(--ink)}

  /* Cart */
  .cart-wrap{padding-top:30px}
  .cart-row{display:grid;grid-template-columns:90px 1fr auto auto auto;gap:18px;align-items:center;padding:18px 0;border-bottom:1px solid var(--line)}
  .cart-row .ci{width:90px;aspect-ratio:3/4;border-radius:10px;overflow:hidden;background:var(--soft)}
  .cart-row .ci-name{font-weight:600;font-size:14px}
  .cart-row .ci-opt{font-size:12px;color:var(--muted);margin-top:3px}
  .qty{display:flex;align-items:center;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .qty button{width:30px;height:32px;font-size:16px;color:var(--muted)}
  .qty span{width:34px;text-align:center;font-size:14px;font-weight:600}
  .ci-price{font-weight:700;font-size:15px;min-width:90px;text-align:right}
  .rm{color:var(--muted);font-size:18px;padding:4px}
  .rm:hover{color:#e0492f}
  .summary{margin-top:30px;display:flex;justify-content:flex-end}
  .summary .box{width:320px;background:var(--soft);border-radius:var(--radius);padding:24px}
  .summary .line{display:flex;justify-content:space-between;font-size:14px;margin-bottom:12px;color:#555}
  .summary .total{display:flex;justify-content:space-between;font-size:18px;font-weight:800;border-top:1px solid var(--line);padding-top:14px;margin-top:6px}
  .summary .btn{width:100%;text-align:center;margin-top:18px}
  .empty{text-align:center;color:var(--muted);padding:80px 0}
  .empty .btn{margin-top:20px}

  /* Footer */
  footer{border-top:1px solid var(--line);margin-top:40px;padding:40px 0;color:var(--muted);font-size:13px}
  .foot-top{display:flex;justify-content:space-between;flex-wrap:wrap;gap:20px;margin-bottom:20px}
  .foot-col h4{color:var(--ink);font-size:13px;margin-bottom:10px}
  .foot-col p{margin-bottom:5px}

  .hidden{display:none}
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;
    padding:13px 24px;border-radius:30px;font-size:14px;opacity:0;transition:.3s;z-index:100;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:900px){
    .grid{grid-template-columns:repeat(2,1fr)}
    .detail{grid-template-columns:1fr;gap:26px}
    .menu{display:none}
    .hero h1{font-size:32px}
    .cart-row{grid-template-columns:70px 1fr auto;row-gap:10px}
    .cart-row .ci{width:70px}
    .ci-price{grid-column:2/4;text-align:left}
  }
</style>
</head>
<body>

<header>
  <div class="wrap nav">
    <div class="logo" style="cursor:pointer" onclick="go('home')">MUSE</div>
    <nav class="menu">
      <a onclick="go('list','all')">전체</a>
      <a onclick="go('list','outer')">아우터</a>
      <a onclick="go('list','top')">상의</a>
      <a onclick="go('list','bottom')">하의</a>
      <a onclick="go('list','acc')">액세서리</a>
    </nav>
    <div class="icons">
      <span style="cursor:pointer" onclick="go('list','all')">검색</span>
      <button class="cart-btn" onclick="go('cart')">장바구니<span class="cart-count" id="cartCount">0</span></button>
    </div>
  </div>
</header>

<main id="app"></main>

<footer>
  <div class="wrap">
    <div class="foot-top">
      <div class="foot-col">
        <h4>MUSE</h4>
        <p>일상에 무드를 더하는 패션 셀렉트샵</p>
      </div>
      <div class="foot-col">
        <h4>고객센터</h4>
        <p>1588-0000 (평일 10:00–18:00)</p>
        <p>help@muse.example</p>
      </div>
      <div class="foot-col">
        <h4>안내</h4>
        <p>배송/교환/반품 · 이용약관 · 개인정보처리방침</p>
      </div>
    </div>
    <p>© 2026 MUSE Demo. 데모용으로 제작된 페이지입니다.</p>
  </div>
</footer>

<div class="toast" id="toast"></div>

<script>
/* ---------- 샘플 데이터 ---------- */
const CAT = {all:'전체',outer:'아우터',top:'상의',bottom:'하의',acc:'액세서리'};
const PALETTE = {
  outer:['#3a4756','#6b7785'], top:['#c9b8a5','#e7ddcf'],
  bottom:['#4a4e5a','#777c88'], acc:['#b08968','#d6b893']
};
function ph(cat,label){
  const [a,b]=PALETTE[cat]||['#ccc','#eee'];
  return `<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
    <defs><linearGradient id="g${label.replace(/\W/g,'')}" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="${a}"/><stop offset="1" stop-color="${b}"/></linearGradient></defs>
    <rect width="300" height="400" fill="url(#g${label.replace(/\W/g,'')})"/>
    <text x="150" y="205" fill="rgba(255,255,255,.85)" font-size="20" font-weight="700"
      text-anchor="middle" font-family="Helvetica">${label}</text></svg>`;
}
const PRODUCTS=[
  {id:1,cat:'outer',brand:'MUSE STUDIO',name:'오버사이즈 울 코트',price:189000,was:249000,tag:'BEST',
   desc:'부드러운 울 혼방 소재로 가볍게 떨어지는 오버사이즈 핏의 싱글 코트입니다. 데일리부터 세미 포멀까지 폭넓게 연출할 수 있습니다.'},
  {id:2,cat:'outer',brand:'MUSE STUDIO',name:'크롭 무스탕 자켓',price:215000,was:null,tag:'NEW',
   desc:'포근한 인조 무스탕 안감과 짧은 기장으로 다리 라인을 길어 보이게 하는 크롭 자켓.'},
  {id:3,cat:'top',brand:'BASIC LAB',name:'코튼 오버핏 셔츠',price:48000,was:59000,tag:null,
   desc:'사계절 입기 좋은 100% 코튼 셔츠. 적당한 두께감과 여유로운 핏으로 이너 활용도가 높습니다.'},
  {id:4,cat:'top',brand:'BASIC LAB',name:'램스울 라운드 니트',price:69000,was:null,tag:'BEST',
   desc:'보풀이 적은 램스울 혼방 니트. 톤다운된 컬러로 어디에나 매치하기 좋습니다.'},
  {id:5,cat:'bottom',brand:'MUSE STUDIO',name:'와이드 슬랙스',price:62000,was:79000,tag:null,
   desc:'구김이 적은 소재의 와이드 핏 슬랙스. 깔끔한 핀턱 디테일로 단정한 무드를 완성합니다.'},
  {id:6,cat:'bottom',brand:'DENIM CO.',name:'스트레이트 데님 팬츠',price:74000,was:null,tag:'NEW',
   desc:'적당한 두께의 비탄력 데님. 곧게 떨어지는 스트레이트 핏으로 빈티지한 무드를 연출합니다.'},
  {id:7,cat:'acc',brand:'EVERYDAY',name:'레더 크로스백',price:89000,was:119000,tag:'SALE',
   desc:'데일리로 메기 좋은 미니멀 크로스백. 스트랩 길이 조절이 가능해 다양하게 활용됩니다.'},
  {id:8,cat:'acc',brand:'EVERYDAY',name:'캐시미어 머플러',price:39000,was:null,tag:null,
   desc:'부드러운 촉감의 캐시미어 혼방 머플러. 넉넉한 폭으로 보온성이 뛰어납니다.'},
  {id:9,cat:'top',brand:'MUSE STUDIO',name:'스트라이프 긴팔 티셔츠',price:34000,was:42000,tag:null,
   desc:'클래식한 보더 스트라이프 패턴의 긴팔 티셔츠. 데일리 코디의 기본 아이템.'},
  {id:10,cat:'outer',brand:'BASIC LAB',name:'베이직 트렌치 코트',price:159000,was:null,tag:'NEW',
   desc:'시즌리스로 활용 가능한 트렌치 코트. 벨트로 실루엣을 자유롭게 조절할 수 있습니다.'},
  {id:11,cat:'bottom',brand:'BASIC LAB',name:'코튼 조거 팬츠',price:45000,was:55000,tag:null,
   desc:'편안한 착용감의 코튼 조거 팬츠. 밑단 리브 마감으로 깔끔한 핏을 유지합니다.'},
  {id:12,cat:'acc',brand:'EVERYDAY',name:'볼캡',price:29000,was:null,tag:'BEST',
   desc:'어떤 룩에도 어울리는 베이직 볼캡. 사이즈 조절 스트랩으로 누구나 편하게 착용 가능.'}
];
PRODUCTS.forEach(p=>p.svg=ph(p.cat,p.brand));
const won=n=>n.toLocaleString('ko-KR')+'원';

/* ---------- 상태 ---------- */
let cart=[]; // {id,size,qty}
let curCat='all';

/* ---------- 라우팅 ---------- */
function go(view,arg){
  window.scrollTo(0,0);
  if(view==='home') renderHome();
  else if(view==='list'){curCat=arg||'all';renderList();}
  else if(view==='detail') renderDetail(arg);
  else if(view==='cart') renderCart();
  syncMenu(view);
}
function syncMenu(view){
  document.querySelectorAll('.menu a').forEach(a=>a.classList.remove('on'));
}

/* ---------- 화면: 홈 ---------- */
function renderHome(){
  const best=PRODUCTS.filter(p=>p.tag==='BEST');
  const news=PRODUCTS.filter(p=>p.tag==='NEW');
  document.getElementById('app').innerHTML=`
    <div class="hero">
      <div class="wrap">
        <h1>일상에 무드를 더하다</h1>
        <p>MUSE가 엄선한 26 S/S 컬렉션을 만나보세요.</p>
        <a class="btn" onclick="go('list','all')">전체 상품 보기</a>
      </div>
    </div>
    <section class="wrap">
      <div class="sec-head"><h2>BEST</h2><span onclick="go('list','all')" style="cursor:pointer">더보기 →</span></div>
      <div class="grid">${best.map(cardHTML).join('')}</div>
    </section>
    <section class="wrap" style="padding-top:0">
      <div class="sec-head"><h2>NEW ARRIVALS</h2><span onclick="go('list','all')" style="cursor:pointer">더보기 →</span></div>
      <div class="grid">${news.map(cardHTML).join('')}</div>
    </section>`;
}

/* ---------- 화면: 목록 ---------- */
function renderList(){
  const items = curCat==='all'?PRODUCTS:PRODUCTS.filter(p=>p.cat===curCat);
  document.getElementById('app').innerHTML=`
    <section class="wrap">
      <div class="sec-head"><h2>${CAT[curCat]}</h2><span>${items.length}개 상품</span></div>
      <div class="cats">
        ${Object.entries(CAT).map(([k,v])=>`<button class="${k===curCat?'on':''}" onclick="go('list','${k}')">${v}</button>`).join('')}
      </div>
      <div class="grid">${items.map(cardHTML).join('')}</div>
    </section>`;
}

function cardHTML(p){
  const off = p.was?Math.round((1-p.price/p.was)*100):0;
  return `<div class="card" onclick="go('detail',${p.id})">
    <div class="thumb">${p.tag?`<span class="tag">${p.tag}</span>`:''}${p.svg}</div>
    <div class="brand">${p.brand}</div>
    <div class="name">${p.name}</div>
    <div class="price">
      ${p.was?`<span class="was">${won(p.was)}</span><span class="off">${off}%</span>`:''}
      ${won(p.price)}
    </div>
  </div>`;
}

/* ---------- 화면: 상세 ---------- */
let selSize=null;
function renderDetail(id){
  const p=PRODUCTS.find(x=>x.id==id); if(!p)return go('list','all');
  selSize=null;
  const off = p.was?Math.round((1-p.price/p.was)*100):0;
  document.getElementById('app').innerHTML=`
    <section class="wrap">
      <a class="back" onclick="history.length>1?go('list',curCat):go('home')">← 목록으로</a>
      <div class="detail">
        <div class="img">${p.svg}</div>
        <div>
          <div class="brand">${p.brand}</div>
          <h1>${p.name}</h1>
          <div class="dprice">
            ${p.was?`<span class="was">${won(p.was)}</span>`:''}
            ${p.was?`<span style="color:#e0492f">${off}% </span>`:''}${won(p.price)}
          </div>
          <div class="opt-label">사이즈</div>
          <div class="sizes" id="sizes">
            ${['S','M','L','XL'].map(s=>`<button onclick="pickSize('${s}',this)">${s}</button>`).join('')}
          </div>
          <div class="detail-actions">
            <button class="btn ghost" onclick="addToCart(${p.id})">장바구니 담기</button>
            <button class="btn" onclick="addToCart(${p.id},true)">바로 구매</button>
          </div>
          <div class="desc">${p.desc}<br><br>· 소재: 시즌별 상이 · 모델 착용 사이즈 M<br>· 무료배송 / 30일 이내 교환·반품 가능</div>
        </div>
      </div>
    </section>`;
}
function pickSize(s,el){
  selSize=s;
  document.querySelectorAll('#sizes button').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
}

/* ---------- 장바구니 ---------- */
function addToCart(id,buyNow){
  if(!selSize){toast('사이즈를 선택해 주세요.');return;}
  const ex=cart.find(c=>c.id===id&&c.size===selSize);
  if(ex)ex.qty++; else cart.push({id,size:selSize,qty:1});
  updateCount();
  if(buyNow){go('cart');} else toast('장바구니에 담았습니다.');
}
function updateCount(){
  document.getElementById('cartCount').textContent=cart.reduce((s,c)=>s+c.qty,0);
}
function changeQty(i,d){
  cart[i].qty+=d;
  if(cart[i].qty<1)cart.splice(i,1);
  updateCount();renderCart();
}
function removeItem(i){cart.splice(i,1);updateCount();renderCart();}

function renderCart(){
  updateCount();
  if(cart.length===0){
    document.getElementById('app').innerHTML=`
      <section class="wrap"><div class="empty">
        <p style="font-size:18px;font-weight:700;color:var(--ink)">장바구니가 비어 있습니다</p>
        <p style="margin-top:6px">마음에 드는 상품을 담아보세요.</p>
        <a class="btn" onclick="go('list','all')">쇼핑 계속하기</a>
      </div></section>`;
    return;
  }
  const rows=cart.map((c,i)=>{
    const p=PRODUCTS.find(x=>x.id===c.id);
    return `<div class="cart-row">
      <div class="ci">${p.svg}</div>
      <div>
        <div class="ci-name">${p.name}</div>
        <div class="ci-opt">${p.brand} · 사이즈 ${c.size}</div>
      </div>
      <div class="qty">
        <button onclick="changeQty(${i},-1)">−</button>
        <span>${c.qty}</span>
        <button onclick="changeQty(${i},1)">+</button>
      </div>
      <div class="ci-price">${won(p.price*c.qty)}</div>
      <button class="rm" onclick="removeItem(${i})">×</button>
    </div>`;
  }).join('');
  const subtotal=cart.reduce((s,c)=>s+PRODUCTS.find(x=>x.id===c.id).price*c.qty,0);
  const ship=subtotal>=50000||subtotal===0?0:3000;
  document.getElementById('app').innerHTML=`
    <section class="wrap cart-wrap">
      <div class="sec-head"><h2>장바구니</h2><span>${cart.reduce((s,c)=>s+c.qty,0)}개</span></div>
      ${rows}
      <div class="summary"><div class="box">
        <div class="line"><span>상품금액</span><span>${won(subtotal)}</span></div>
        <div class="line"><span>배송비</span><span>${ship===0?'무료':won(ship)}</span></div>
        <div class="total"><span>합계</span><span>${won(subtotal+ship)}</span></div>
        <button class="btn" onclick="toast('데모 페이지입니다. 실제 결제는 진행되지 않습니다.')">결제하기</button>
      </div></div>
    </section>`;
}

/* ---------- 토스트 ---------- */
let toastT;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);
}

/* ---------- 시작 ---------- */
renderHome();
</script>
</body>
</html>
